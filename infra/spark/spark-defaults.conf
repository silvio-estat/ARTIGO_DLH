# ============================================================
# Spark — Configuração padrão para Iceberg + MinIO (S3A)
# ============================================================

# Extensões Iceberg
spark.sql.extensions                                org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

# Catálogo Iceberg via Hive Metastore
spark.sql.catalog.lakehouse                         org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.lakehouse.type                    hive
spark.sql.catalog.lakehouse.uri                     thrift://hive-metastore:9083
spark.sql.catalog.lakehouse.warehouse               s3a://lakehouse/warehouse
spark.sql.catalog.lakehouse.io-impl                 org.apache.iceberg.hadoop.HadoopFileIO

# S3A → MinIO
spark.hadoop.fs.s3a.endpoint                        http://minio:9000
spark.hadoop.fs.s3a.access.key                      ${MINIO_ROOT_USER}
spark.hadoop.fs.s3a.secret.key                      ${MINIO_ROOT_PASSWORD}
spark.hadoop.fs.s3a.path.style.access               true
spark.hadoop.fs.s3a.impl                            org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.connection.ssl.enabled          false
spark.hadoop.fs.s3a.aws.credentials.provider        org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider

# Formato padrão de arquivo
spark.sql.parquet.compression.codec                 snappy

# OpenLineage — linhagem automática para OpenMetadata
spark.extraListeners                                io.openlineage.spark.agent.OpenLineageSparkListener

# Configurações de desempenho (PoC — máquina local)
spark.sql.shuffle.partitions                        4
spark.default.parallelism                           4
spark.driver.memory                                 1g
spark.executor.memory                               1g
spark.cores.max                                     1
